# Local/prod deployment (docs/ia/runtime.md §5): backend + frontend + a volume
# holding the SQLite DB and uploaded/generated files.
#
#   docker compose up --build
#   → frontend http://localhost:3000, backend http://localhost:8000
#
# To require a shared-secret token, set DMS_API_TOKEN on the backend and pass the
# same value as NEXT_PUBLIC_DMS_API_TOKEN to the frontend build args.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DMS_SEED: "0"
      DMS_CORS_ORIGINS: '["http://localhost:3000"]'
      # DMS_API_TOKEN: "change-me"          # enable the API token gate
      # DMS_GITHUB_TOKEN: ""                 # real GitHub Issues (else mock)
      # DMS_GITHUB_OWNER: ""
      # DMS_GITHUB_REPO: ""
    volumes:
      - dms-data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
        # NEXT_PUBLIC_DMS_API_TOKEN: "change-me"   # match backend DMS_API_TOKEN
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  dms-data:
